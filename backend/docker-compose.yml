services:
  postgres:
    # pgvector/pgvector bundles the `vector` extension on top of the official
    # postgres:17 image (Debian variant). Required by the hybrid knowledge
    # retrieval embedding column (see alembic b546d7e401fe_rag_chunks_pgvector).
    image: pgvector/pgvector:pg17
    container_name: aicrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aicrm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicrm_dev_password}
      POSTGRES_DB: aicrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aicrm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: aicrm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aicrm
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  aicrm:
    name: aicrm
    driver: bridge
